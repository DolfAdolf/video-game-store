

services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: game_store
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d game_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-backend:
    build: ./python-backend
    container_name: python-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/game_store
      JWT_SECRET: super-secret-key-change-me
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  node-backend:
    build: ./node-backend
    container_name: node-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/game_store
      JWT_SECRET: super-secret-key-change-me
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - python-backend
      - node-backend
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge